<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>全独立控制版</title>
<style>
body {
  /* 这一行只改了 background-size 的属性 */
  background: url(images/渡繁华.jpg) no-repeat center center;
  background-size: 100% 100%; /* 改为 100% 100% 强制拉伸铺满，确保上下边都能显示 */
  background-attachment: fixed;
  min-height: 100vh;
  margin: 0;
}

/*----------------------------------------*/
/* 按钮：每个都可以单独改 位置、大小、透明度
/*----------------------------------------*/
#btnImg1  { position: absolute; top: 440px;  left: 1750px;   width: 125px; padding: 65px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg2  { position: absolute; top: 550px;  left: 1290px;  width: 220px; padding: 100px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg3  { position: absolute; top: 540px;  left: 230px;  width: 200px; padding: 90px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg4  { position: absolute; top: 70px;  left: 130px;  width: 180px; padding: 70px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg5  { position: absolute; top: 850px;  left: 950px;  width: 500px; padding: 30px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg7  { position: absolute; top: 850px;  left: 1710px;   width: 250px; padding: 50px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg8  { position: absolute; top: 400px;  left: 800px;  width: 300px; padding: 100px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg11 { position: absolute; top: 500px;  left: 80px;  width: 100px; padding: 75px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }
#btnImg12 { position: absolute; top: 90px;  left: 890px;  width: 110px; padding: 75px; opacity: 0; background: #2d8cf0; color:#fff; border:none; border-radius:6px; }

#btnAud1 { position: absolute; top: 880px; left: 130px;  width: 15px; padding: 20px; opacity: 0; background: #ff7d4f; color:#fff; border:none; border-radius:6px; }
#btnAud2 { position: absolute; top: 175px; left: 320px; width: 15px; padding: 15px; opacity: 0; background: #ff7d4f; color:#fff; border:none; border-radius:6px; }
#btnAud4 { position: absolute; top: 600px; left: 720px; width: 50px; padding: 28px; opacity: 0; background: #ff7d4f; color:#fff; border:none; border-radius:6px; }
#btnAud6 { position: absolute; top: 180px; left: 770px; width: 100px; padding: 35px; opacity: 0; background: #ff7d4f; color:#fff; border:none; border-radius:6px; }
#btnAud7 { position: absolute; top: 880px; left: 300px; width: 5px; padding: 20px; opacity: 0; background: #ff7d4f; color:#fff; border:none; border-radius:6px; }
#btnAud8 { position: absolute; top: 410px; left: 1120px; width: 100px; padding: 40px; opacity: 0; background: #ff7d4f; color:#fff; border:none; border-radius:6px; }
/*----------------------------------------*/
/* 图片：每个都单独定位 + 等比例缩放
/* 只改 width 就自动按比例变大小
/*----------------------------------------*/
.show-img {
  display: none;
  position: absolute;
  height: auto;
}

#img1  { width: 260px; top: 310px; left: 1700px;  }
#img2  { width: 300px; top: 530px; right: 450px; }
#img3  { width: 320px; top: 500px; left: 180px;  }
#img4  { width: 300px; top: 100px; right: 1600px; }
#img5  { width: 280px; top: 720px; left: 1050px;  }
#img7  { width: 280px; top: 720px; left: 1700px;  }
#img8  { width: 320px; top: 320px; right: 900px; }
#img11 { width: 250px; top: 420px; left: 30px;  }
#img12 { width: 230px; top: 65px; right: 900px; }

</style>
</head>
<body>

<!--================= 图片按钮 =================-->
<button id="btnImg1">西兴</button>
<button id="btnImg2">茶馆</button>
<button id="btnImg3">东大寺</button>
<button id="btnImg4">繁华商品区</button>
<button id="btnImg5">共振桥</button>
<button id="btnImg7">蓝印花布</button>
<button id="btnImg8">三庙一塔</button>
<button id="btnImg11">jining</button>
<button id="btnImg12">tongzhou</button>

<!--================= 音频按钮 =================-->
<button id="btnAud1">当铺老板</button>
<button id="btnAud2">酒店烧刀</button>
<button id="btnAud4">米官</button>
<button id="btnAud6">挑脚的</button>
<button id="btnAud7">药铺老板</button>
<button id="btnAud8">母女</button>
<!--================= 图片 =================-->
<img class="show-img" id="img1" src="images/西兴.png">
<img class="show-img" id="img2" src="images/茶馆.png">
<img class="show-img" id="img3" src="images/东大寺.png">
<img class="show-img" id="img4" src="images/繁华商品区.png">
<img class="show-img" id="img5" src="images/拱振桥.png">
<img class="show-img" id="img6" src="images/江南民居.png">
<img class="show-img" id="img7" src="images/蓝印花布.png">
<img class="show-img" id="img8" src="images/三庙一塔.png">
<img class="show-img" id="img9" src="images/太白楼.png">
<img class="show-img" id="img10" src="images/竹竿巷.png">
<img class="show-img" id="img11" src="images/jining.png">
<img class="show-img" id="img12" src="images/tongzhou.png">

<!--================= 音频 =================-->
<audio id="aud1" src="audio/当铺老板.wav">
<audio id="aud2" src="audio/酒店烧刀.wav">
<audio id="aud4" src="audio/米官.wav">
<audio id="aud6" src="audio/挑脚的.wav">
<audio id="aud7" src="audio/药铺老板.wav">
<audio id="aud8" src="audio/母女.mp3">

<script>
const allImgs = document.querySelectorAll('.show-img');

function hideAllImages() {
  allImgs.forEach(img => img.style.display = 'none');
}

function playAudio(id) {
  const a = document.getElementById(id);
  try { a.currentTime = 0; a.play(); } catch (e) {}
}

// 图片按钮
document.getElementById('btnImg1').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img1.style.display = 'block';
}
document.getElementById('btnImg2').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img2.style.display = 'block';
}
document.getElementById('btnImg3').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img3.style.display = 'block';
}
document.getElementById('btnImg4').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img4.style.display = 'block';
}
document.getElementById('btnImg5').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img5.style.display = 'block';
}
document.getElementById('btnImg7').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img7.style.display = 'block';
}
document.getElementById('btnImg8').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img8.style.display = 'block';
}
document.getElementById('btnImg11').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img11.style.display = 'block';
}
document.getElementById('btnImg12').onclick = (e) => {
  e.stopPropagation();
  hideAllImages();
  img12.style.display = 'block';
}

// 音频按钮
document.getElementById('btnAud1').onclick = (e) => { e.stopPropagation(); playAudio('aud1'); }
document.getElementById('btnAud2').onclick = (e) => { e.stopPropagation(); playAudio('aud2'); }
document.getElementById('btnAud4').onclick = (e) => { e.stopPropagation(); playAudio('aud4'); }
document.getElementById('btnAud5').onclick = (e) => { e.stopPropagation(); playAudio('aud5'); }
document.getElementById('btnAud6').onclick = (e) => { e.stopPropagation(); playAudio('aud6'); }
document.getElementById('btnAud7').onclick = (e) => { e.stopPropagation(); playAudio('aud7'); }
document.getElementById('btnAud8').onclick = (e) => { e.stopPropagation(); playAudio('aud8'); }

// 点击页面空白/背景 → 隐藏图片
document.body.onclick = hideAllImages;
</script>
</body>
</html>
